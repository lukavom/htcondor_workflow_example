jobscript: "condor-jobscript.sh"
executor: htcondor
htcondor-jobdir: logs
shared-fs-usage: none
# default-storage-provider: fs # use the local file system
default-resources:
  classad_MaxRuntimeHours: 4
  threads: 1
  request_disk: "10GB"
  request_memory: "8GB"
  preserve_relative_paths: true
max-jobs-per-second: 128
max-status-checks-per-second: 5
local-cores: 4
jobs: 256
latency-wait: 5
verbose: False
keep-going: True
printshellcmds: True
keep-incomplete: True
rerun-incomplete: True
rerun-triggers: { mtime, params, code }
retries: 0 # restart fallible rules this many times. Sometimes jobs fail because the file system has a small hiccup at the wrong time.
